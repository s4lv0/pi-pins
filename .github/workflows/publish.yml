name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          persist-credentials: false

      # No dependency cache is enabled (no `cache:` input), so cache poisoning does not apply.
      # No registry-url / token: auth uses npm trusted publishing (OIDC).
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0 # zizmor: ignore[cache-poisoning]
        with:
          # Trusted publishing requires npm >= 11.5.1; node 24.5+ bundles npm 11.5.1
          node-version: 24

      - name: Check tag matches package.json version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "${TAG#v}" != "$PKG_VERSION" ]; then
            echo "Release tag $TAG does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Publish (trusted publishing + provenance)
        run: npm publish --provenance --access public
